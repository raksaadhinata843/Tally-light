; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32(VMIX)_TX]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4
build_flags = -D MODE_TX_ESP32(VMIX)
lib_deps = nrf24/RF24@^1.6.1

[env:esp8266_RX]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
monitor_port = COM4
build_flags = -D MODE_RX_ESP8266
upload_speed = 115200
lib_deps = nrf24/RF24@^1.6.1

[env:nano_TX]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_flags = -D MODE_TX_NANO
lib_deps = nrf24/RF24@^1.6.1

[env:nano_RX]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 115200
monitor_speed = 115200
build_flags = -D MODE_RX_NANO
lib_deps = nrf24/RF24 @ ^1.6.1

[env:esp32(SWITCHER)_TX]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4
build_flags = -D MODE_TX_ESP32(SWITCHER)

[env:esp8266udp_RX]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
monitor_port = COM4
build_flags = -D MODE_RX_ESP8266UDP
upload_speed = 115200